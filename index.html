<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiyatRadar — Market Fiyat Karşılaştırma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <!-- Header with Cart -->
  <header class="header-wrapper">
    <div class="container">
      <!-- Top Right Cart Integration -->
      <a href="/cart.html" target="_blank" class="cart-nav-link" id="cartNavLink">
        <span>🛒 Sepetim</span>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>

      <a href="/" class="navbar-brand">
        <span class="brand-text">FIYAT<span class="brand-accent">RADAR</span></span>
      </a>

      <p class="hero-tagline">En geniş market ağıyla her üründe en ucuzunu anında bul, bütçeni koru.</p>

      <div class="header-stats">
        <div class="stat-item">
          <span class="stat-value">7.000+</span>
          <span class="stat-label">Ürün</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">5+</span>
          <span class="stat-label">Market</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">Hergün</span>
          <span class="stat-label">Güncel</span>
        </div>
      </div>

      <!-- Enlarged Dropdown Filters with Emojis -->
      <div class="filters-section">
        <!-- Marketler Dropdown -->
        <div class="dropdown" id="marketDropdown">
          <button class="dropdown-toggle" onclick="toggleDropdown('marketDropdown')">
            🏪 Marketler <span>▼</span>
          </button>
          <div class="dropdown-menu" id="marketFilters">
            <!-- Markets injected here -->
          </div>
        </div>

        <!-- Kategoriler Dropdown -->
        <div class="dropdown" id="categoryDropdown">
          <button class="dropdown-toggle" onclick="toggleDropdown('categoryDropdown')">
            📂 Kategoriler <span>▼</span>
          </button>
          <div class="dropdown-menu" id="categoryFilters">
            <a href="/?category=atistirmalik" class="dropdown-item">🍪 Atıştırmalık</a>
            <a href="/?category=sut-urunleri" class="dropdown-item">🧀 Süt Ürünleri</a>
            <a href="/?category=temel-gida" class="dropdown-item">🌾 Temel Gıda</a>
            <a href="/?category=icecek" class="dropdown-item">🥤 İçecekler</a>
            <a href="/?category=temizlik" class="dropdown-item">🧹 Temizlik</a>
            <a href="/?category=kisisel-bakim" class="dropdown-item">🧴 Kişisel Bakım</a>
            <a href="/?category=meyve-sebze" class="dropdown-item">🍎 Meyve & Sebze</a>
            <a href="/?category=et-tavuk" class="dropdown-item">🥩 Et & Tavuk</a>
            <a href="/?category=dondurulmus" class="dropdown-item">🧊 Dondurulmuş</a>
            <a href="/?category=bebek" class="dropdown-item">👶 Bebek</a>
          </div>
        </div>
      </div>

      <div id="resultsCount" style="font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 15px; font-weight: 600;">
        ...</div>
    </div>
  </header>

  <!-- Search Area -->
  <section class="search-section">
    <div class="container">
      <div class="search-container">
        <svg class="search-icon-large" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" class="main-search-input" placeholder="Ürün veya kategori ara...">
      </div>
    </div>
  </section>

  <!-- Product Grid -->
  <main class="container">
    <div id="productGrid" class="products-grid">
      <!-- Products injected here -->
    </div>

    <div id="loading" style="text-align: center; padding: 60px; display: none;">
      <div style="font-weight: 700; color: var(--secondary); letter-spacing: 1px;">YÜKLENİYOR...</div>
    </div>

    <div id="scrollEnd" style="height: 100px;"></div>
  </main>

  <!-- Product Detail Modal -->
  <div id="productModal" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-body" id="modalContent" style="display: flex; width: 100%;"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    window.toggleDropdown = (id) => {
      const el = document.getElementById(id);
      const isOpen = el.classList.contains('open');
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
      if (!isOpen) el.classList.add('open');
    };
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
      }
    });
  </script>
</body>

</html>
