<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiyatRadar — Market Fiyat Karşılaştırma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <!-- Modern Header -->
  <header class="header-wrapper">
    <div class="container-fluid header-container">
      <div class="header-left">
        <a href="/" class="navbar-brand">
          <span class="brand-text">FIYAT<span class="brand-accent">RADAR</span></span>
        </a>
        <a href="/" class="home-link-modern" title="Ana Menü">
          <span class="home-icon">🏠</span>
          <span class="home-text">Ana Menü</span>
        </a>
      </div>

      <div class="header-center">
        <div class="search-container">
          <svg class="search-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="searchInput" class="main-search-input" placeholder="Ürün veya marka ara...">
        </div>
      </div>

      <div class="header-right">
        <div class="header-stats-mini">
          <div class="mini-stat">
            <span id="statProductCount" class="stat-val">9.000+</span>
            <span class="stat-lbl">Ürün</span>
          </div>
        </div>
        <a href="/cart.html" target="_blank" class="cart-btn-modern" id="cartNavLink">
          <span class="cart-icon">🛒</span>
          <span class="cart-badge" id="cartBadge">0</span>
        </a>
      </div>
    </div>
  </header>

  <div class="app-layout">
    <!-- Sticky Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-title">🏪 Marketler</h3>
        <div id="marketFilters" class="sidebar-menu">
          <!-- Markets injected here -->
        </div>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-title">📂 Kategoriler</h3>
        <div id="categoryFilters" class="sidebar-menu">
          <a href="#" data-category="hepsi" class="sidebar-item active">🏠 Tümü</a>
          <a href="#" data-category="atistirmalik" class="sidebar-item">🍪 Atıştırmalık</a>
          <a href="#" data-category="sut-urunleri" class="sidebar-item">🧀 Süt Ürünleri</a>
          <a href="#" data-category="temel-gida" class="sidebar-item">🌾 Temel Gıda</a>
          <a href="#" data-category="icecek" class="sidebar-item">🥤 İçecekler</a>
          <a href="#" data-category="temizlik" class="sidebar-item">🧹 Temizlik</a>
          <a href="#" data-category="kisisel-bakim" class="sidebar-item">🧴 Kişisel Bakım</a>
          <a href="#" data-category="meyve-sebze" class="sidebar-item">🍎 Meyve & Sebze</a>
          <a href="#" data-category="et-tavuk" class="sidebar-item">🥩 Et & Tavuk</a>
          <a href="#" data-category="dondurulmus" class="sidebar-item">🧊 Dondurulmuş</a>
          <a href="#" data-category="bebek" class="sidebar-item">👶 Bebek</a>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="content-header">
        <div id="resultsCount" class="results-info">... ürün listeleniyor</div>
        <div class="sort-options">
          <select id="sortSelect" class="modern-select">
            <option value="default">Sıralama: Varsayılan</option>
            <option value="price-asc">En Düşük Fiyat</option>
            <option value="price-desc">En Yüksek Fiyat</option>
            <option value="discount">En Yüksek İndirim</option>
          </select>
        </div>
      </div>

      <div id="productGrid" class="products-grid">
        <!-- Products injected here -->
      </div>

      <div id="loading" class="loading-spinner">
        <div class="spinner"></div>
        <span>Veriler yükleniyor...</span>
      </div>

      <div id="scrollEnd" style="height: 20px;"></div>
    </main>
  </div>

  <!-- Product Detail Modal -->
  <div id="productModal" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-body" id="modalContent" style="display: flex; width: 100%;"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    window.toggleDropdown = (id) => {
      const el = document.getElementById(id);
      const isOpen = el.classList.contains('open');
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
      if (!isOpen) el.classList.add('open');
    };
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
      }
    });
  </script>
</body>

</html>
