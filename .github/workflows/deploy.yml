name: FiyatRadar CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies (Backend)
      run: |
        cd server
        npm install

    - name: Install dependencies (Frontend)
      run: |
        cd next-front
        npm install

    - name: Build Frontend
      run: |
        cd next-front
        npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    - name: Lint check
      run: |
        cd next-front
        npm run lint
